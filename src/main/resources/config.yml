  countdown-start: "&7Enough players! Starting in &e{seconds} &7seconds..."
  countdown-tick: "&7Game starting in &e{seconds}&7..."
  game-start: "&a&lThe game has begun! &7Random loot will rain down every &e{interval} &7seconds!"
  loot-received: "&7You received: &b{item}"
  eliminated: "&c&lYou were eliminated! &7Better luck next time."
  eliminated-void: "&c&lYou fell off the map and were eliminated!"
