# ===================================================
#  Pillars of Fortune - Configuration (Multi-Arena)
# ===================================================

game:
  min-players: 2
  max-players: 16
  countdown-seconds: 15
  loot-interval-seconds: 5
  items-per-drop: 1
  max-duration-seconds: 300
  cancel-fall-damage: true

# ===================================================
#  LOOT TABLE — fully customisable
# ===================================================
# Each tier has a weight (out of total weight across all tiers).
# Default: junk=50, common=30, useful=15, rare=5 → total 100
#
# Each item entry:
#   material: EXACT Bukkit material name (must be a valid item)
#   min-amount: minimum quantity given
#   max-amount: maximum quantity given
#
# Find all material names at:
#   https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html

loot:
  junk:
    weight: 50
    items:
      - { material: DIRT,          min-amount: 1, max-amount: 1 }
      - { material: GRAVEL,        min-amount: 1, max-amount: 1 }
      - { material: SAND,          min-amount: 1, max-amount: 1 }
      - { material: COBBLESTONE,   min-amount: 1, max-amount: 1 }
      - { material: OAK_LOG,       min-amount: 1, max-amount: 1 }
      - { material: STICK,         min-amount: 1, max-amount: 1 }
      - { material: STRING,        min-amount: 1, max-amount: 1 }
      - { material: FEATHER,       min-amount: 1, max-amount: 1 }
      - { material: BONE,          min-amount: 1, max-amount: 1 }

  common:
    weight: 30
    items:
      - { material: STONE,         min-amount: 4, max-amount: 16 }
      - { material: OAK_PLANKS,    min-amount: 4, max-amount: 16 }
      - { material: GLASS,         min-amount: 2, max-amount: 8  }
      - { material: LADDER,        min-amount: 2, max-amount: 8  }
      - { material: WOODEN_SWORD,  min-amount: 1, max-amount: 1  }
      - { material: STONE_SWORD,   min-amount: 1, max-amount: 1  }
      - { material: BREAD,         min-amount: 2, max-amount: 6  }
      - { material: COOKED_BEEF,   min-amount: 1, max-amount: 4  }

  useful:
    weight: 15
    items:
      - { material: IRON_SWORD,      min-amount: 1, max-amount: 1 }
      - { material: IRON_CHESTPLATE, min-amount: 1, max-amount: 1 }
      - { material: IRON_HELMET,     min-amount: 1, max-amount: 1 }
      - { material: IRON_BOOTS,      min-amount: 1, max-amount: 1 }
      - { material: BOW,             min-amount: 1, max-amount: 1 }
      - { material: ARROW,           min-amount: 4, max-amount: 16 }
      - { material: SHIELD,          min-amount: 1, max-amount: 1 }
      - { material: GOLDEN_CARROT,   min-amount: 2, max-amount: 4 }
      - { material: ENDER_PEARL,     min-amount: 1, max-amount: 2 }
      - { material: SNOWBALL,        min-amount: 4, max-amount: 16 }

  rare:
    weight: 5
    items:
      - { material: DIAMOND_SWORD,      min-amount: 1, max-amount: 1 }
      - { material: DIAMOND_CHESTPLATE, min-amount: 1, max-amount: 1 }
      - { material: DIAMOND_HELMET,     min-amount: 1, max-amount: 1 }
      - { material: DIAMOND_LEGGINGS,   min-amount: 1, max-amount: 1 }
      - { material: DIAMOND_BOOTS,      min-amount: 1, max-amount: 1 }
      - { material: GOLDEN_APPLE,       min-amount: 1, max-amount: 1 }
      - { material: ENDER_PEARL,        min-amount: 2, max-amount: 4 }
      - { material: TRIDENT,            min-amount: 1, max-amount: 1 }
      - { material: ELYTRA,             min-amount: 1, max-amount: 1 }

